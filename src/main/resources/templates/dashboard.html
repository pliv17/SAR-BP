<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Panel - SAR-BP</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">SAR-BP</a>
        <div class="ms-auto">
            <a class="btn btn-outline-light btn-sm" th:href="@{/logout}">Cerrar sesión</a>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h2>Bienvenido al panel</h2>
    <p class="text-muted">Aquí podrá ver el sistema según su rol.</p>
    <div class="mt-3">
        <a class="btn btn-primary" sec:authorize="hasRole('ADMIN')" th:href="@{/admin}">Panel Administrador</a>
        <a class="btn btn-success" sec:authorize="hasRole('LIDER')" th:href="@{/lider}">Panel Líder</a>
    </div>
</div>
</body>
</html>
