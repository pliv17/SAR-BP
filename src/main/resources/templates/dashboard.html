<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Panel | SAR-BP</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .loader { animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script th:inline="javascript">
        window.onload = function() {
            /*[# sec:authorize="hasRole('ADMIN')"]*/
                setTimeout(() => { window.location = '/admin'; }, 500);
            /*[/]*/
            /*[# sec:authorize="hasRole('LIDER')"]*/
                setTimeout(() => { window.location = '/lider'; }, 500);
            /*[/]*/
        };
    </script>
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height:100vh;">

<div class="text-center">
    <div class="spinner-border text-primary mb-3 loader" role="status">
        <span class="visually-hidden">Redirigiendo...</span>
    </div>
    <h5 class="text-primary mb-2">Redirigiendo a tu panel...</h5>
    <p class="text-muted small">Por favor espera mientras te llevamos al lugar correcto.</p>

    <!-- Fallback sin JS -->
    <div class="mt-4">
        <a class="btn btn-primary me-2" sec:authorize="hasRole('ADMIN')" th:href="@{/admin}">
            <i class="bi bi-shield-lock me-1"></i> Panel Administrador
        </a>
        <a class="btn btn-success" sec:authorize="hasRole('LIDER')" th:href="@{/lider}">
            <i class="bi bi-megaphone me-1"></i> Panel Líder
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
