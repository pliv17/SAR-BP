<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - SAR-BP</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            max-width: 400px;
            width: 100%;
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .card-body {
            padding: 2.5rem;
        }
        .brand-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .brand-icon {
            font-size: 3rem;
            color: #0d6efd;
            margin-bottom: 0.5rem;
        }
        .brand-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #212529;
        }
        .form-label {
            font-weight: 600;
            color: #495057;
            margin-bottom: 0.5rem;
        }
        .btn-login {
            font-weight: 600;
            padding: 0.625rem;
            border-radius: 8px;
            background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
            border: none;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #0a58ca 0%, #0844b3 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(13,110,253,0.4);
        }
        .alert {
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="card">
        <div class="card-body">
            <div class="brand-header">
                <div class="brand-icon">
                    <i class="bi bi-broadcast-pin"></i>
                </div>
                <div class="brand-title">SAR-BP</div>
                <small class="text-muted">Sistema de Alertas Vecinales</small>
            </div>

            <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <strong>Error:</strong> Usuario o contraseña incorrectos.
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">
                        <i class="bi bi-person-fill me-1"></i>Usuario
                    </label>
                    <input type="text" class="form-control form-control-lg" id="username" name="username"
                           placeholder="Ingresa tu usuario" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">
                        <i class="bi bi-lock-fill me-1"></i>Contraseña
                    </label>
                    <input type="password" class="form-control form-control-lg" id="password" name="password"
                           placeholder="Ingresa tu contraseña" required>
                </div>
                <button type="submit" class="btn btn-primary btn-login w-100 btn-lg mt-2">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar sesión
                </button>
            </form>

            <hr class="my-4">
            <div class="text-center">
                <p class="text-muted small mb-0">¿Necesitas ayuda?</p>
                <a href="/" class="text-decoration-none small">Volver al inicio</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
