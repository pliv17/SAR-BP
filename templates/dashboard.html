<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Panel | SAR-BP</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!--
        Esta vista actúa como puente de redirección.
        Spring Security redirige aquí tras el login (/dashboard).
        Desde aquí el usuario es enviado a su panel correcto con JS inmediato.
        Si JS está desactivado, se muestran los botones como respaldo.
    -->
    <script th:inline="javascript">
        window.onload = function() {
            /*[# sec:authorize="hasRole('ADMIN')"]*/ window.location = '/admin'; /*[/]*/
            /*[# sec:authorize="hasRole('LIDER')"]*/ window.location = '/lider'; /*[/]*/
        };
    </script>
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height:100vh;">

<div class="text-center">
    <div class="spinner-border text-primary mb-3" role="status">
        <span class="visually-hidden">Redirigiendo...</span>
    </div>
    <p class="text-muted">Redirigiendo a tu panel...</p>

    <!-- Fallback sin JS -->
    <div class="mt-3">
        <a class="btn btn-primary me-2" sec:authorize="hasRole('ADMIN')" th:href="@{/admin}">
            <i class="bi bi-shield-lock me-1"></i> Panel Admin
        </a>
        <a class="btn btn-success" sec:authorize="hasRole('LIDER')" th:href="@{/lider}">
            <i class="bi bi-megaphone me-1"></i> Panel Líder
        </a>
    </div>
</div>

</body>
</html>
